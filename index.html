async function decryptTemplates(password) { const keyMaterial = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]); const key = await crypto.subtle.deriveKey({ name: "PBKDF2", salt: b64ToBytes(ENCRYPTED_PAYLOAD.salt), iterations: ENCRYPTED_PAYLOAD.iterations, hash: "SHA-256" }, keyMaterial, { name: "AES-GCM", length: 256 }, false, ["decrypt"]); const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b64ToBytes(ENCRYPTED_PAYLOAD.iv) }, key, b64ToBytes(ENCRYPTED_PAYLOAD.data)); return JSON.parse(new TextDecoder().decode(decrypted)); }
function currentEdition() { return editionEl.value === "interpark" ? "interpark" : "world"; }
function currentEditionLabel() { return EDITION_LABELS[currentEdition()]; }
function updateEditionFields() { passportField.classList.toggle("hidden", currentEdition() !== "world"); }
function clearForm() { for (const name of VARIABLE_NAMES) document.getElementById(name).value = ""; document.getElementById("qrcodeState").value = ""; document.getElementById("useEnglish").checked = false; editionEl.value = "world"; updateEditionFields(); }
function clearInputsAfterGenerate() { for (const name of VARIABLE_NAMES) document.getElementById(name).value = ""; document.getElementById("qrcodeState").value = ""; }
function showApp() { clearForm(); loginView.classList.add("hidden"); appView.classList.remove("hidden"); updateFilesText(); }
function showLogin() { TEMPLATES = null; document.getElementById("password").value = ""; loginStatus.textContent = ""; statusEl.textContent = ""; appView.classList.add("hidden"); loginView.classList.remove("hidden"); }
function updateFilesText() { if (!TEMPLATES) return; const selected = selectedTemplates().map(t => t.name).join(", "); document.getElementById("files").textContent = "\u5f53\u524d\u7248\u672c\uff1a" + currentEditionLabel() + " | \u6a21\u677f\uff1a" + selected; }
function parseUrl(firstLine) { const raw = firstLine.split(":").slice(1).join(":").trim(); const matches = [...raw.matchAll(/"((?:\\.|[^"\\])*)"/g)].map(match => JSON.parse('"' + match[1] + '"')); if (!matches.length) throw new Error("url \u6ce8\u91ca\u683c\u5f0f\u9519\u8bef: " + firstLine); return matches.length === 1 ? matches[0] : matches; }
function collectReplacements() { const replacements = { orgName: document.getElementById("orgName").value.trim() }; for (const name of VARIABLE_NAMES) { if (name === "orgName") continue; if (name === "passportexpiredDate" && currentEdition() !== "world") continue; const value = document.getElementById(name).value.trim(); if (value) replacements[name] = value; } return replacements; }
function removeDisabledOptions(lines, replacements) { const kept = []; let skipNext = false; for (const line of lines) { if (skipNext) { skipNext = false; continue; } const trimmed = line.trim(); if (trimmed.startsWith("//@option:")) { const option = trimmed.split(":").slice(1).join(":").trim(); const variable = OPTION_VARIABLES[option]; if (variable && !(variable in replacements)) { skipNext = true; continue; } } kept.push(line); } return kept; }
function fromCharCodeExpr(value) { const codes = []; for (let i = 0; i < value.length; i++) codes.push(value.charCodeAt(i)); return "String.fromCharCode(" + codes.join(",") + ")"; }
function applyRawVars(value, replacements) { for (const [key, replacement] of Object.entries(replacements)) value = value.split(key).join(replacement); return value; }
function replaceVars(script, replacements) { return script.replace(/"((?:\\.|[^"\\])*)"/g, (match) => { const decoded = JSON.parse(match); const changed = applyRawVars(decoded, replacements); return changed === decoded ? match : fromCharCodeExpr(changed); }); }
function encodedSummary(replacements) { return Object.entries(replacements).map(([key, value]) => key + " = " + fromCharCodeExpr(value) + " -> " + value).join("\n"); }
function selectedTemplates() { const base = TEMPLATES.sources[currentEdition()] || []; return document.getElementById("useEnglish").checked && TEMPLATES.english ? base.concat([TEMPLATES.english]) : base; }
function buildItem(template, index, replacements) { const rawLines = template.content.split("\n"); const lines = rawLines.map((line, i) => i < rawLines.length - 1 ? line + "\n" : line); const firstLine = (lines[0] || "").trim(); if (!firstLine.startsWith("//url:")) throw new Error(template.name + " \u7f3a\u5c11\u5f00\u5934 //url: \u6ce8\u91ca"); const script = replaceVars(removeDisabledOptions(lines.slice(1), replacements).join(""), replacements); const unresolved = VARIABLE_NAMES.filter(name => !(name in replacements) && script.includes(name)); if (unresolved.length) throw new Error(template.name + " \u4ecd\u5305\u542b\u672a\u586b\u5199\u53d8\u91cf: " + unresolved.join(", ")); return { enabled: true, name: "change-" + index, url: parseUrl(firstLine), script }; }
function statusText(prefix, scripts, replacements) { const lines = [prefix, "\u7248\u672c\uff1a" + currentEditionLabel(), "\u811a\u672c\u6570\uff1a" + scripts.length]; const summary = encodedSummary(replacements); if (summary) lines.push("", "String.fromCharCode:", summary); return lines.join("\n"); }
function buildScripts() { const replacements = collectReplacements(); const templates = selectedTemplates(); const scripts = templates.map((template, index) => buildItem(template, index + 1, replacements)); return { scripts, filename: "proxypin-scripts.json", replacements }; }
function downloadJson() { try { const { scripts, filename, replacements } = buildScripts(); const blob = new Blob([JSON.stringify(scripts, null, 4)], { type: "application/json;charset=utf-8" }); const url = URL.createObjectURL(blob); const link = document.createElement("a"); link.href = url; link.download = filename; document.body.appendChild(link); link.click(); link.remove(); URL.revokeObjectURL(url); statusEl.className = "status ok"; statusEl.textContent = statusText("\u5df2\u751f\u6210\uff1a" + filename, scripts, replacements); clearInputsAfterGenerate(); updateFilesText(); } catch (error) { statusEl.className = "status error"; statusEl.textContent = error.message; } }
function previewJson() { try { const { scripts, replacements } = buildScripts(); statusEl.className = "status ok"; statusEl.textContent = statusText("\u68c0\u67e5\u901a\u8fc7", scripts, replacements); updateFilesText(); } catch (error) { statusEl.className = "status error"; statusEl.textContent = error.message; } }
document.getElementById("loginButton").addEventListener("click", async () => { loginStatus.textContent = ""; try { TEMPLATES = await decryptTemplates(document.getElementById("password").value); showApp(); } catch (error) { loginStatus.textContent = "\u5bc6\u94a5\u4e0d\u6b63\u786e\uff0c\u6216\u8005\u6d4f\u89c8\u5668\u4e0d\u652f\u6301\u672c\u5730\u89e3\u5bc6\u3002"; } });
document.getElementById("password").addEventListener("keydown", event => { if (event.key === "Enter") document.getElementById("loginButton").click(); });
document.getElementById("logoutButton").addEventListener("click", showLogin);
document.getElementById("generateButton").addEventListener("click", downloadJson);
document.getElementById("previewButton").addEventListener("click", previewJson);
editionEl.addEventListener("change", () => { updateEditionFields(); updateFilesText(); statusEl.textContent = ""; });
document.getElementById("useEnglish").addEventListener("change", updateFilesText);
</script>
</body>
